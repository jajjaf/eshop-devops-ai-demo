# NOMMER LE PIPELINE COMME LE FICHIER (SANS ".yml")
# Bonne pratique : le nom du pipeline = nom du fichier YAML

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
# Déclenchement automatique à chaque push sur la branche main
# (ici filtré uniquement sur les modifications dans le dossier src)

stages:
# Définition des différentes étapes du pipeline

- stage: Build
  displayName: Build de la solution .NET Core

  jobs:
  # Un job s'exécute sur un agent

  - job: Build

    pool:
      vmImage: ubuntu-latest
      # Agent hébergé par Microsoft (Linux)

    steps:
    # Les étapes sont exécutées séquentiellement

    # Restauration des dépendances NuGet
    - task: DotNetCoreCLI@2
      displayName: Restauration
      inputs:
        command: 'restore'
        projects: '**/*.sln'
        feedsToUse: 'select'

    # Compilation de l’application
    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: 'build'
        projects: '**/*.sln'
        # **/*.sln signifie : tous les fichiers solution du dépôt
        # Cela permet de construire toute l'application

    # Exécution des tests unitaires
    - task: DotNetCoreCLI@2
      displayName: Tests
      inputs:
        command: 'test'
        projects: 'tests/UnitTests/*.csproj'
        # Tous les projets de tests unitaires dans ce dossier
        # Seuls les tests unitaires sont exécutés ici

    # Publication de l’application (préparation au déploiement)
    - task: DotNetCoreCLI@2
      displayName: Publication
      inputs:
        command: 'publish'
        # Prépare l’application pour le déploiement (compilation + packaging)

        publishWebProjects: true
        # Cible automatiquement les projets web déployables

        arguments: '-o $(Build.ArtifactStagingDirectory)'
        # Dossier de sortie pour les fichiers générés
        # $(Build.ArtifactStagingDirectory) = dossier temporaire pour stocker les artefacts

    # Publication des artefacts du pipeline
    - task: PublishPipelineArtifact@1
      displayName: Publication des artefacts - Site Web
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        # Chemin des fichiers à publier (issus de l'étape précédente)

        artifact: 'Website'
        # Nom de l’artefact utilisé dans les étapes suivantes

        publishLocation: 'pipeline'
        # Stockage dans Azure DevOps (au niveau du pipeline)